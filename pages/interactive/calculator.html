<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Waste Calculator | Wasted Aloha</title>
    <link rel="stylesheet" href="/WastedAloha/css/home.css">
    <link rel="icon" type="image/svg" href="/WastedAloha/assets/logo.svg">
</head>
<body>

<header>
    <div class="header-left">
        <a href="/WastedAloha/index.html">
            <img src="/WastedAloha/assets/logotext.svg" alt="Wasted Aloha Logo" class="logo">
        </a>
    </div>
    <div class="header-right">
        <nav class="header-nav">
            <a href="/WastedAloha/index.html">Home</a>
            <p>|</p>
            <a href="/WastedAloha/pages/articles.html">Articles</a>
            <p>|</p>
            <a href="/WastedAloha/pages/data.html">Data</a>
        </nav>
    </div>
</header>

<section class="hero" id="home">
</section>

<section class="section">
    <h2>Food Waste Calculator</h2>
    <p>Discover how much food you waste each week based on your household size and grocery spending!</p>

    <div class="calculator-container">
        <form id="wasteCalculatorForm" class="calculator-form">
            <div class="form-group">
                <label for="householdSize">🏠 Household Size:</label>
                <select id="householdSize" name="householdSize" required onchange="calculateWaste()">
                    <option value="">Select household size...</option>
                    <option value="0.8">1–2 people</option>
                    <option value="1">3–4 people</option>
                    <option value="1.3">5+ people</option>
                </select>
            </div>

            <div class="form-group">
                <label for="grocerySpending">🛒 Weekly Grocery Spending:</label>
                <select id="grocerySpending" name="grocerySpending" required onchange="calculateWaste()">
                    <option value="">Select spending range...</option>
                    <option value="10">Under $50</option>
                    <option value="20">$50–$100</option>
                    <option value="40">$100–$200</option>
                    <option value="70">$200+</option>
                </select>
            </div>
        </form>

        <div id="results" class="calculator-results" style="display: none;">
            <div class="result-card">
                <div class="result-icon">💰</div>
                <div class="result-content">
                    <h3>Food Waste Per Week</h3>
                    <p class="result-value">$<span id="wastePerWeek">0</span></p>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .calculator-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
    }

    .calculator-form {
        background-color: #f5f5f5;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 40px;
    }

    .form-group {
        margin-bottom: 25px;
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-weight: bold;
        margin-bottom: 12px;
        color: #1b5e20;
        font-size: 1.1rem;
    }

    .form-group select {
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
        font-family: inherit;
        background-color: white;
        cursor: pointer;
    }

    .form-group select:focus {
        outline: none;
        border-color: #1b5e20;
        box-shadow: 0 0 5px rgba(27, 94, 32, 0.3);
    }

    .calculator-results {
        animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .result-card {
        display: flex;
        align-items: center;
        background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
        color: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(27, 94, 32, 0.3);
        text-align: center;
        justify-content: center;
        flex-direction: column;
    }

    .result-icon {
        font-size: 3rem;
        margin-bottom: 15px;
    }

    .result-content h3 {
        margin: 0 0 15px 0;
        font-size: 1.3rem;
    }

    .result-value {
        margin: 0;
        font-size: 2.5rem;
        font-weight: bold;
    }

    .no-results {
        background-color: #f5f5f5;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        color: #666;
        border-left: 5px solid #ccc;
    }

    @media (max-width: 600px) {
        .calculator-form {
            padding: 20px;
        }

        .result-card {
            padding: 30px 20px;
        }

        .result-value {
            font-size: 2rem;
        }
    }
</style>

<script>
    function calculateWaste() {
        const householdSize = parseFloat(document.getElementById('householdSize').value);
        const grocerySpending = parseFloat(document.getElementById('grocerySpending').value);

        // Check if both values are selected
        if (isNaN(householdSize) || isNaN(grocerySpending)) {
            document.getElementById('results').style.display = 'none';
            return;
        }

        // Calculate: Waste = Base Amount × Household Multiplier
        const wastePerWeek = grocerySpending * householdSize;

        // Display results
        document.getElementById('wastePerWeek').textContent = wastePerWeek.toFixed(2);
        document.getElementById('results').style.display = 'block';
    }
</script>

<footer>
    <p>Wasted Aloha by Mason Engevold & Randy Pasion | CS475/ART475 - Spring 2026 - University of Hawaii at Hilo</p>
</footer>

</body>
</html>
